<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
  .bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 65px;

  display: flex;
  justify-content: space-around;
  align-items: center;

  background: #020617;
  border-top: 1px solid rgba(255,255,255,0.1);

  z-index: 999;
}

.nav-item {
  flex: 1;
  text-align: center;
  color: #aaa;
  font-size: 12px;
}

.nav-item span {
  display: block;
  font-size: 18px;
}

.nav-item.active {
  color: gold;
}
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0a1f44, #000);
  color: white;
}

/* TOP */
.top {
  padding: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

.info {
  margin-top: 20px;
}

.box {
  margin: 20px;
  padding: 20px;
  background: gold;
  color: black;
  border-radius: 15px;
  text-align: center;
}

.menu {
  margin: 20px;
}

.item {
  padding: 15px;
  border-bottom: 1px solid #333;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="top">
  <div class="logo">
    <img src="https://i.ibb.co/NnY0jXCx/IMG-20240322-WA0000.jpg">
    <h2>DOLAR</h2>
  </div>

  <div class="info">
    <p id="email"></p>
    <p style="color:white;">ID: <span id="userId" style="color:white;"></span></p>
  </div>
</div>

<div class="box">
  <p>Toplam bakiye (USDT)</p>
  <h2 id="balance">0</h2>
</div>

<div class="menu">
  <div class="item" onclick="logout()">Çıkış Yap</div>
</div>

<script>
window.onload = function() {
  const emailEl = document.getElementById("email");
  const userIdEl = document.getElementById("userId");
  const balanceEl = document.getElementById("balance");

  // 1. Hafızadan ID al
  let storedId = localStorage.getItem("userId");
  console.log("Hafızadaki ID:", storedId);

  // ID yoksa veya hatalıysa giriş sayfasına gönder
  if (!storedId || storedId === "undefined" || storedId === "null") {
    alert("Oturum bulunamadı, lütfen tekrar giriş yapın.");
    window.location.href = "login.html";
    return;
  }

  // 2. Server'a istek at
  // Not: API adresinin sonuna ID'yi düzgün eklediğimizden emin oluyoruz
  const profileApiUrl = "https://swerrrrr.onrender.com/user/" + storedId;

  fetch(profileApiUrl)
    .then(res => {
      if (!res.ok) throw new Error("Server hatası: " + res.status);
      return res.json();
    })
    .then(user => {
      if (user.error) {
        emailEl.innerText = "Kullanıcı bulunamadı ❌";
        return;
      }

      // 3. Ekrana Yazdır
      emailEl.innerText = user.email || "E-posta yok";
      userIdEl.innerText = user.id || storedId;
      balanceEl.innerText = (user.balance !== undefined) ? user.balance : "0";
      
      console.log("Veriler başarıyla getirildi:", user);
    })
    .catch(err => {
      console.error("Profil yükleme hatası:", err);
      emailEl.innerText = "Bağlantı Hatası! (Server uyanıyor olabilir)";
      emailEl.style.color = "orange";
    });
}

function logout() {
  localStorage.clear();
  window.location.href = "index.html";
}
</script>

  

<div class="bottom-nav">

  <div class="nav-item" onclick="window.location.href='dashboard.html'">
    <span>🏠</span>
    <p id="nav_home">Ev</p>
  </div>

  <div class="nav-item" onclick="window.location.href='vip.html'">
    <span>👑</span>
    <p id="nav_vip">VIP</p>
  </div>

  <div class="nav-item" onclick="window.location.href='tasks.html'">
    <span>📊</span>
    <p id="nav_task">Görev</p>
  </div>

  <div class="nav-item active">
    <span>👤</span>
    <p id="nav_profile">Ben</p>
  </div>

</div>
</body>
</html>
