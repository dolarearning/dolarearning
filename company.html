function applyLang(){
  let lang = localStorage.getItem("lang") || "tr";
  let t = translations[lang];

  document.getElementById("title").innerText = t.title;
  document.getElementById("dateTitle").innerText = t.dateTitle;
  document.getElementById("dateText").innerText = t.dateText;
  document.getElementById("aboutTitle").innerText = t.aboutTitle;
  document.getElementById("aboutText").innerText = t.aboutText;
  document.getElementById("visionTitle").innerText = t.visionTitle;
  document.getElementById("visionText").innerText = t.visionText;

 let list = document.getElementById("advList");
list.innerHTML = "";
t.adv.forEach(item=>{
  
  let li = document.createElement("li");
  li.innerText = item;
  list.appendChild(li);
});

  document.getElementById("statsTitle").innerText = t.statsTitle;
  document.getElementById("th1").innerText = t.th1;
  document.getElementById("th2").innerText = t.th2;
  document.getElementById("td1").innerText = t.td1;
  document.getElementById("td2").innerText = t.td2;
  document.getElementById("td3").innerText = t.td3;

  document.getElementById("securityTitle").innerText = t.securityTitle;
  document.getElementById("securityText").innerText = t.securityText;
}
