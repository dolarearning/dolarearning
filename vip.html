<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* 🔥 زر رجوع احترافي */
.back-btn {
  position: fixed;
  top: 15px;
  left: 15px;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  background: linear-gradient(145deg, #1e293b, #0f172a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: white;
  cursor: pointer;
  z-index: 9999;

  box-shadow:
    0 0 10px rgba(0,0,0,0.5),
    0 0 20px rgba(0,255,200,0.3);

  transition: 0.3s;
}

.back-btn:hover {
  background: linear-gradient(145deg, #00f5d4, #00bbf9);
  color: black;
  transform: scale(1.1);
  box-shadow:
    0 0 20px #00f5d4,
    0 0 40px #00bbf9;
}

/* 💎 VIP CARD */
.vip-card {
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(145deg, #1e293b, #334155);
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}


.vip-card {
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(145deg, #1e293b, #334155);
  box-shadow:
    0 0 10px rgba(0,255,200,0.2),
    inset 0 0 10px rgba(0,255,200,0.1);
  transition: 0.3s;
}

.vip-card:hover {
  transform: translateY(-5px);
  box-shadow:
    0 0 20px rgba(0,255,200,0.4);
}

/* Hover */
.vip-card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow:
    0 0 20px rgba(0,255,200,0.5),
    0 0 40px rgba(0,187,249,0.4);
}

/* عنوان */
.vip-card h3 {
  margin-bottom: 10px;
  font-size: 20px;
  color: #00f5d4;
}

/* المحتوى */
.vip-box {
  display: flex;
  justify-content: space-between;
}

/* اليسار */
.left p {
  margin: 6px 0;
}

/* اليمين */
.right p {
  margin: 6px 0;
  color: #94a3b8;
  text-align: right;
}

/* اللون الأخضر */
.green {
  color: #00ff88;
  font-weight: bold;
  text-shadow: 0 0 10px #00ff88;
}
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 65px;
  background: #020617;

  display: flex;
  justify-content: space-around;
  align-items: center;

  border-top: 1px solid rgba(255,255,255,0.1);
  z-index: 999;
}

.nav-item {
  flex: 1;
  text-align: center;
  color: #aaa;
  font-size: 12px;
}

.nav-item span {
  display: block;
  font-size: 18px;
}

.nav-item.active {
  color: #00f5d4;
}
</style>
</head>

<body>

<!-- 🔥 زر رجوع -->
<div class="back-btn" onclick="goBack()">←</div>

<!-- VIP1 -->
<div class="vip-card">
  <h3>VIP1</h3>
  <div class="vip-box">
    <div class="left">
      <p>500.00 ~ 100.00</p>
      <p class="green">20.00%</p>
      <p class="green">180</p>
    </div>
    <div class="right">
      <p class="t-recharge"></p>
      <p class="t-profit"></p>
      <p class="t-time"></p>
    </div>
  </div>
</div>

<!-- VIP2 -->
<div class="vip-card">
  <h3>VIP2</h3>
  <div class="vip-box">
    <div class="left">
      <p>1,000.00 ~ 500.00</p>
      <p class="green">25,00%</p>
      <p class="green">180</p>
    </div>
    <div class="right">
      <p class="t-recharge"></p>
      <p class="t-profit"></p>
      <p class="t-time"></p>
    </div>
  </div>
</div>

<!-- VIP3 -->
<div class="vip-card">
  <h3>VIP3</h3>
  <div class="vip-box">
    <div class="left">
      <p>2,000.00 ~ 1,000.00</p>
      <p class="green">30.00%</p>
      <p class="green">180</p>
    </div>
    <div class="right">
      <p class="t-recharge"></p>
      <p class="t-profit"></p>
      <p class="t-time"></p>
    </div>
  </div>
</div>

<!-- VIP4 -->
<div class="vip-card">
  <h3>VIP4</h3>
  <div class="vip-box">
    <div class="left">
      <p>+6,000.00 ~ 2,000.00</p>
      <p class="green">35.00%</p>
      <p class="green">180</p>
    </div>
    <div class="right">
      <p class="t-recharge"></p>
      <p class="t-profit"></p>
      <p class="t-time"></p>
    </div>
  </div>
</div>

<script>
function goBack(){
  window.history.back();
}

const translations = {
  tr: {
    nav_home: "Ev",
    nav_vip: "VIP",
    nav_task: "Görev",
    nav_team: "Takım",
    nav_profile: "Ben",
    recharge: "Yatırım",
    profit: "Kazanç",
    time: "Gün"
  },
  ar: {
    nav_home: "الرئيسية",
    nav_vip: "VIP",
    nav_task: "تجمع التعدين",
    nav_team: "الفريق",
    nav_profile: "أنا",
    recharge: "مبلغ إعادة الشحن",
    profit: "دخل التعدين",
    time: "يوم"
  },
  en: {
    nav_home: "Home",
    nav_vip: "VIP",
    nav_task: "Tasks",
    nav_team: "Team",
    nav_profile: "Me",
    recharge: "Recharge",
    profit: "Profit",
    time: "Days"
  }
};

function applyLang(lang){
  const t = translations[lang];
  if(!t) return;

  let el;

  el = document.getElementById("nav_home");
  if(el) el.innerText = t.nav_home;

  el = document.getElementById("nav_vip");
  if(el) el.innerText = t.nav_vip;

  el = document.getElementById("nav_task");
  if(el) el.innerText = t.nav_task;

  el = document.getElementById("nav_team"); // 🔥 ما يكسر لو مش موجود
  if(el) el.innerText = t.nav_team;

  el = document.getElementById("nav_profile");
  if(el) el.innerText = t.nav_profile;

  // VIP TEXT
  document.querySelectorAll(".t-recharge").forEach(e => e.innerText = t.recharge);
  document.querySelectorAll(".t-profit").forEach(e => e.innerText = t.profit);
  document.querySelectorAll(".t-time").forEach(e => e.innerText = t.time);
}
window.onload = function(){
  let lang = localStorage.getItem("lang") || "tr";
  applyLang(lang);
}
</script>
<div class="bottom-nav">

  <div class="nav-item active" onclick="window.location.href='dashboard.html'">
    <span>🏠</span>
    <p id="nav_home">Ev</p>
  </div>

  <div class="nav-item" onclick="window.location.href='vip.html'">
    <span>👑</span>
    <p id="nav_vip">VIP</p>
  </div>

  <div class="nav-item" onclick="window.location.href='tasks.html'">
    <span>📊</span>
   <p id="nav_task">Görev</p>
  </div>

  <div class="nav-item" onclick="window.location.href='profile.html'">
  <span>👤</span>
  <p id="nav_profile">Ben</p>
</div>

</div>


</div>

</div>
<script src="common.js"></script>
</body>
</html>
