<!DOCTYPE html>
<html lang="ar">
<head>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit</title>

<style>
  #errorMsg {
  color: red;
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
}
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:20px;
}

.step{
  display:none;
}

.step.active{
  display:block;
}

.box{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
  cursor:pointer;
}

.btn{
  margin-top:20px;
  padding:15px;
  background:orange;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>
  <div class="back-btn" onclick="goBack()">
  <span>←</span>
</div>

<h2>إيداع أموال</h2>

<!-- STEP 1 -->
<div class="step active" id="step1">
  <div class="box" onclick="goStep(2)">
    USDT
  </div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <div class="box" onclick="selectNetwork('TRC20')">USDT TRC20</div>
  <div class="box" onclick="selectNetwork('ERC20')">USDT ERC20</div>
  <div class="box" onclick="selectNetwork('BEP20')">USDT BEP20</div>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
  <input id="amount" placeholder="المبلغ" style="width:100%;padding:10px;">
  <div class="btn" onclick="checkAmount()">متابعة</div>
  
</div>
<p id="errorMsg"></p>

<!-- STEP 4 -->
<div class="step" id="step4">
  <div id="summary"></div>
  <div class="btn" onclick="goStep(5)">الحصول على عنوان الدفع</div>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">
  <div class="box">
    <p id="networkTitle"></p>
    <p id="address"></p>
    <button onclick="copyText()" id="copyBtn">📋</button>
  </div>

  <!-- 🔥 هون لازم يكون -->
  <div style="margin-top:20px">

    <div style="background:#1e293b;padding:20px;border-radius:15px;text-align:center">
      <p id="uploadTitle">📤 رفع صورة إثبات الدفع</p>
      <input type="file" id="fileInput" accept="image/*" style="display:none">

<button onclick="document.getElementById('fileInput').click()" id="chooseBtn">
  📂
</button>

<p id="fileName">No file</p>
    </div>

    <div class="btn" onclick="submitPayment()" id="payBtn">
      ✔ تم الدفع
    </div>

  </div>
</div>

</div>

<script>
  function goBack(){
  window.history.back();
}
  document.getElementById("fileInput").addEventListener("change", function(){
  let file = this.files[0];
  let lang = localStorage.getItem("lang") || "tr";
  let t = translations[lang];

  if(file){
    document.getElementById("fileName").innerText = file.name;
  } else {
    document.getElementById("fileName").innerText = t.nofile;
  }
});
  function submitPayment(){
  let file = document.getElementById("fileInput").files[0];

  if(!file){
    alert("❌ Lütfen ödeme ekran görüntüsü yükleyin");
    return;
  }

  document.getElementById("successPopup").style.display = "flex";
}

function goHome(){
  window.location.href = "dashboard.html";
}
  
  function applyLang(){
  let lang = localStorage.getItem("lang") || "tr";
  let t = translations[lang];

  document.getElementById("copyBtn").innerText = "📋 " + t.copy;
  document.getElementById("chooseBtn").innerText = "📂 " + t.choose;
  document.getElementById("fileName").innerText = t.nofile;
  document.getElementById("uploadTitle").innerText = t.upload;
  document.getElementById("payBtn").innerText = t.pay;
  document.getElementById("successText").innerText = t.success;
  document.getElementById("homeBtn").innerText = t.home;
}
  const translations = {
  tr: {
    copy: "Kopyala",
    min_deposit: "❌ En az 100 USDT yükleyebilirsiniz",
    upload: "📤 Ödeme kanıtı yükle",
    pay: "✔ Ödeme yaptım",
    success: "✅ تم استلام طلبك",
    home: "Ana sayfaya git",
    choose: "Dosya seç",
    nofile: "Dosya seçilmedi"
  },
  en: {
    copy: "Copy",
    min_deposit: "❌ Minimum deposit is 100 USDT",
    upload: "📤 Upload payment proof",
    pay: "✔ I Paid",
    success: "✅ Request received",
    home: "Go to home",
    choose: "Choose file",
    nofile: "No file selected"
  },
  ar: {
    copy: "نسخ",
    min_deposit: "❌ الحد الأدنى للإيداع هو 100 USDT",
    upload: "📤 رفع صورة إثبات الدفع",
    pay: "✔ تم الدفع",
    success: "✅ تم استلام طلبك",
    home: "الذهاب إلى الصفحة الرئيسية",
    choose: "اختيار صورة",
    nofile: "لم يتم اختيار ملف"
  }
};
  function goBack(){
  window.history.back();
}
  function checkAmount(){
  let amount = document.getElementById("amount").value;
  let error = document.getElementById("errorMsg");

  let lang = localStorage.getItem("lang") || "tr";
  let t = translations[lang];

  if(amount < 100){
    error.innerText = t.min_deposit;
    return;
  }

  error.innerText = "";
  goStep(4);
}
let network = "";
let amount = "";

function selectNetwork(n){
  network = n;
  goStep(3);
}

function goStep(n){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById("step"+n).classList.add("active");

  if(n === 4){
    amount = document.getElementById("amount").value;
    document.getElementById("summary").innerText =
      "USDT - " + network + " - $" + amount;
  }

  if(n === 5){
    let address = "";

    if(network === "TRC20"){
      address = "TGCFrW81nFN4XSiRY7XN9anV1vRZAt2Z21";
    } else if(network === "ERC20"){
      address = "0x3db4fcb94be127a636975ea51b701070e3ee9dc1";
    } else if(network === "BEP20"){
      address = "0x3db4fcb94be127a636975ea51b701070e3ee9dc1";
    }

    document.getElementById("networkTitle").innerText =
      "USDT " + network;

    document.getElementById("address").innerText = address;
  }
}

function copyText(){
  let text = document.getElementById("address").innerText;
  navigator.clipboard.writeText(text);
  alert("Kopyalandı ✅");
}

applyLang();
</script>
<div id="successPopup" style="
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:9999;
">

  <div style="
  background:linear-gradient(145deg,#1e293b,#0f172a);
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 30px gold;
  ">

    <h2 id="successText">✅ Talebiniz alındı</h2>

    <button onclick="goHome()" id="homeBtn" style="
    margin-top:20px;
    padding:12px 20px;
    background:gold;
    border:none;
    border-radius:10px;
    font-weight:bold;
    ">
      الصفحة الرئيسية
    </button>

  </div>

</div>
</body>
</html>
