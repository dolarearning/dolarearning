<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:100px;
}

input{
  display:block;
  margin:10px auto;
  padding:12px;
  width:250px;
  border-radius:10px;
  border:none;
}

button{
  padding:12px 20px;
  background:orange;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🔧 Admin Panel</h2>

<input id="password" placeholder="Password">
<input id="uid" placeholder="User ID">
<input id="amount" placeholder="Amount">

<button onclick="addBalance()">Add Balance</button>
<button onclick="removeBalance()">Remove Balance</button>
<button onclick="finishTimer()">Finish Timer</button>
<script>
const API = "https://swerrrr.onrender.com"; // حط رابطك

// ➕ إضافة رصيد
function addBalance(){

  let pass = document.getElementById("password").value;

  if(pass !== "kbs"){
    alert("❌ Şifre yanlış!");
    return;
  }

  let id = document.getElementById("uid").value;
  let amount = Number(document.getElementById("amount").value);

  fetch(API + "/add-balance", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id: id,
      amount: amount
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.error){
      alert("❌ kullanıcı bulunamadı");
    } else {
      alert("✅ bakiye eklendi");
    }
  });
}


// ➖ حذف رصيد
function removeBalance(){

  let pass = document.getElementById("password").value;

  if(pass !== "kbs"){
    alert("❌ Şifre yanlış!");
    return;
  }

  let id = document.getElementById("uid").value;
  let amount = Number(document.getElementById("amount").value);

  fetch(API + "/add-balance", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id: id,
      amount: -amount // 🔥 سالب = حذف
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.error){
      alert("❌ kullanıcı bulunamadı");
    } else {
      alert("✅ bakiye silindi");
    }
  });
}


// ⏱️ إنهاء التايمر (اختياري)
function finishTimer(){
  alert("Timer reset özelliği henüz backend'e bağlanmadı");
}
</script>

</body>
</html>
